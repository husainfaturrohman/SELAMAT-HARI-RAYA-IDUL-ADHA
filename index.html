<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Hari Raya Idul Adha</title>
    <style>
        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Card Container */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        /* Icon/Ornamen */
        .icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        /* Typography */
        h1 {
            font-size: 2rem;
            color: #ffd700; /* Warna Emas */
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        h2 {
            font-size: 1.2rem;
            color: #e0e0e0;
            font-weight: 400;
            margin-bottom: 25px;
        }

        .line {
            width: 80px;
            height: 3px;
            background: #ffd700;
            margin: 0 auto 25px auto;
            border-radius: 2px;
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            color: #f0f0f0;
            margin-bottom: 30px;
            font-style: italic;
        }

        /* Button */
        .btn {
            display: inline-block;
            background: #ffd700;
            color: #0f2027;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        .btn:hover {
            background: #ffffff;
            color: #203a43;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.4);
        }

        /* Animasi Mengambang untuk Icon */
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        /* Responsif untuk HP Layar Kecil */
        @media (max-width: 400px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.6rem;
            }
            h2 {
                font-size: 1rem;
            }
            p {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Icon Emoji sebagai pengganti gambar agar presisi dan ringan -->
        <div class="icon">🕋</div>
        
        <h1>Selamat Hari Raya</h1>
        <h2>Idul Adha 1447 H</h2>
        
        <div class="line"></div>
        
        <p>
            "Daging (hewan kurban) dan darahnya itu sekali-kali tidak akan mencapai ridha Allah, tetapi yang mencapai ridha-Nya adalah ketakwaan kamu."<br>
            Semoga keikhlasan dan berkah selalu menyertai kita semua.
        </p>
        
        <a href="#" class="btn" onclick="alert('Selamat merayakan bersama keluarga tercinta!')">Aamiin Yaa Rabbal 'Aalamiin</a>
    </div>

</body>
</html>
